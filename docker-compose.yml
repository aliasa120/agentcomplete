version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-backend
    restart: unless-stopped
    ports:
      - "2024:2024"
    env_file:
      - .env                          # backend/.env (root)
    environment:
      - LANGGRAPH_HOST=0.0.0.0
      - LANGGRAPH_PORT=2024

  frontend:
    build:
      context: ./deep-agents-ui-main
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars must be baked in at build time (sourced from frontend/.env by deploy.sh)
        - NEXT_PUBLIC_SUPABASE_URL
        - NEXT_PUBLIC_SUPABASE_ANON_KEY
    container_name: agent-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./deep-agents-ui-main/.env    # frontend/.env
    depends_on:
      - backend
